<style>.leaflet-cluster-anim .leaflet-marker-icon, .leaflet-cluster-anim .leaflet-marker-shadow {

<style>
  :root{--mf:#e4002b;--if:#00843d;--bg:#f5f6f8;--ink:#1c2430;--mut:#6b7682;--line:#e4e8ee;}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink)}
  #app{display:flex;flex-direction:column;height:100vh}
  header{background:#fff;border-bottom:1px solid var(--line);padding:12px 18px;display:flex;flex-wrap:wrap;gap:14px;align-items:center}
  header h1{font-size:17px;margin:0;font-weight:700;letter-spacing:-.2px}
  header .sub{color:var(--mut);font-size:12px;margin-top:2px}
  .controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-left:auto}
  .seg{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .seg button{border:0;background:#fff;padding:7px 13px;font-size:13px;cursor:pointer;font-weight:600;color:var(--mut)}
  .seg button.active[data-b=ALL]{background:var(--ink);color:#fff}
  .seg button.active[data-b=MF]{background:var(--mf);color:#fff}
  .seg button.active[data-b=IF]{background:var(--if);color:#fff}
  select,input[type=search]{padding:7px 11px;font-size:13px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);outline:none}
  input[type=search]{min-width:210px}
  #main{flex:1;display:flex;min-height:0}
  #map{flex:1;min-width:0;background:#e9edf1}
  #side{width:380px;border-left:1px solid var(--line);display:flex;flex-direction:column;background:#fff}
  #count{padding:10px 16px;font-size:12px;color:var(--mut);border-bottom:1px solid var(--line);font-weight:600}
  #list{overflow:auto;flex:1}
  .item{padding:11px 16px;border-bottom:1px solid var(--line);cursor:pointer;display:flex;gap:11px;align-items:flex-start}
  .item:hover{background:var(--bg)}
  .dot{width:9px;height:9px;border-radius:50%;margin-top:5px;flex:none}
  .dot.MF{background:var(--mf)}.dot.IF{background:var(--if)}
  .item .nm{font-size:13.5px;font-weight:600;line-height:1.3}
  .item .meta{font-size:11.5px;color:var(--mut);margin-top:3px}
  .badge{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:5px;color:#fff;vertical-align:middle}
  .badge.MF{background:var(--mf)}.badge.IF{background:var(--if)}
  .pin{border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.25);width:14px;height:14px}
  .empty{padding:30px 16px;color:var(--mut);font-size:13px;text-align:center}
  #nearbar{display:flex;gap:6px;padding:10px 12px;border-bottom:1px solid var(--line);background:#fbfcfe}
  #nearbar input{flex:1;min-width:0;padding:7px 10px;font-size:13px;border:1px solid var(--line);border-radius:8px;outline:none}
  #nearbar button{border:1px solid var(--line);background:#fff;border-radius:8px;padding:7px 10px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
  #nearbar #nearbtn{background:#2563eb;color:#fff;border-color:#2563eb}
  #nearbar button:disabled{opacity:.6;cursor:default}
  #nearinfo{display:none;align-items:center;gap:8px;padding:8px 12px;background:#eef4ff;border-bottom:1px solid var(--line);font-size:12px;color:#1d4ed8}
  #nearinfo .nearlabel{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600}
  #nearinfo #clearnear{border:0;background:#dbe6ff;color:#1d4ed8;border-radius:6px;width:22px;height:22px;cursor:pointer;font-size:13px;line-height:1;flex:none}
  .item .itxt{flex:1;min-width:0}
  .distbadge{margin-left:auto;align-self:center;font-size:12px;font-weight:700;color:#2563eb;white-space:nowrap;padding-left:8px}
  .star{color:#f5a623}
  .origin-pin{width:18px;height:18px;border-radius:50%;background:#2563eb;border:3px solid #fff;box-shadow:0 0 0 2px #2563eb,0 0 0 6px rgba(37,99,235,.25)}
  .toggle{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:9px;padding:6px 11px;font-size:13px;font-weight:600;color:var(--mut);cursor:pointer;user-select:none;background:#fff}
  .toggle input{accent-color:#d11;width:15px;height:15px;cursor:pointer;margin:0}
  .toggle.on{border-color:#d11;color:#b00020;background:#fff5f5}
  #covlegend{position:absolute;left:10px;bottom:24px;z-index:1000;pointer-events:none;background:#fff;border:1px solid var(--line);border-radius:9px;padding:9px 12px;font-size:12px;box-shadow:0 2px 10px rgba(0,0,0,.15);max-width:240px;display:none}
  #covlegend .sw{display:inline-block;width:14px;height:14px;border-radius:3px;background:rgba(214,17,17,.38);border:1px solid rgba(214,17,17,.7);vertical-align:-2px;margin-right:6px}
  #covlegend b{color:var(--ink)}
  #covlegend .muted{color:var(--mut);display:block;margin-top:5px;line-height:1.4}
  @media(max-width:780px){#main{flex-direction:column}#side{width:100%;border-left:0;border-top:1px solid var(--line);max-height:45%}.controls{margin-left:0;width:100%}input[type=search]{flex:1;min-width:0}}
</style>
</head>
<body>
<div id="app">
  <header>
    <div>
      <h1>Sucursales · MiFarma &amp; InkaFarma</h1>
      <div class="sub" id="hsub"></div>
    </div>
    <div class="controls">
      <div class="seg" id="brand">
        <button data-b="ALL" class="active">Todas</button>
        <button data-b="MF">MiFarma</button>
        <button data-b="IF">InkaFarma</button>
      </div>
      <select id="region"></select>
      <input type="search" id="q" placeholder="Buscar local o código…"/>
      <select id="covsel" title="Sombrea zonas sin farmacia cercana (rojo) o el alcance de entrega por drones Zipline (verde)">
        <option value="0">Capa de cobertura: off</option>
        <optgroup label="Zonas SIN farmacia cercana (rojo)">
          <option value="10">A más de 10 km</option>
          <option value="50">A más de 50 km</option>
          <option value="100">A más de 100 km</option>
          <option value="200">A más de 200 km</option>
        </optgroup>
        <optgroup label="Alcance drones Zipline (verde)">
          <option value="p1">Platform 1 — 60 millas (~97 km)</option>
          <option value="p2">Platform 2 — 10 millas (~16 km)</option>
        </optgroup>
      </select>
    </div>
  </header>
  <div id="main">
    <div id="map"><div id="covlegend"></div></div>
    <aside id="side">
      <div id="nearbar">
        <input id="near" type="search" placeholder="Dirección o lugar en Perú…"/>
        <button id="nearbtn">Más cercana</button>
        <button id="geobtn" title="Usar mi ubicación">📍</button>
      </div>
      <div id="nearinfo"></div>
      <div id="count"></div>
      <div id="list"></div>
    </aside>
  </div>
</div>

const DRONE_PCT = {"p1": 71.6, "p2": 10.6};
const BRANDS = {MF:{name:"MiFarma",color:"#e4002b"}, IF:{name:"InkaFarma",color:"#00843d"}};
let fBrand="ALL", fRegion="", fQ="";

const map = L.map("map",{preferCanvas:true}).setView([-9.2,-75.0], 6);
L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",{
  attribution:'&copy; OpenStreetMap &copy; CARTO', maxZoom:19, subdomains:"abcd"}).addTo(map);

const cluster = L.markerClusterGroup({chunkedLoading:true, maxClusterRadius:50, spiderfyOnMaxZoom:true});
map.addLayer(cluster);
const markerByKey = {};
const originLayer = L.layerGroup().addTo(map);
let origin=null, lastNearest=null;

function haversine(a,b){
  const R=6371, toR=Math.PI/180;
  const dLat=(b.lat-a.lat)*toR, dLon=(b.lon-a.lon)*toR;
  const s=Math.sin(dLat/2)**2 + Math.cos(a.lat*toR)*Math.cos(b.lat*toR)*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(s));
}
function fmtDist(km){ return km<1 ? Math.round(km*1000)+" m" : (km<10?km.toFixed(1):Math.round(km))+" km"; }
function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function originIcon(){return L.divIcon({className:"",html:'<div class="origin-pin"></div>',iconSize:[22,22],iconAnchor:[11,11]});}

function icon(b){return L.divIcon({className:"",html:'<div class="pin" style="background:'+BRANDS[b].color+'"></div>',iconSize:[14,14],iconAnchor:[7,7]});}

const regions = [...new Set(DATA.map(d=>d.r))].sort((a,b)=>a.localeCompare(b,"es"));
const rsel = document.getElementById("region");
rsel.innerHTML = '<option value="">Todas las regiones</option>' + regions.map(r=>'<option>'+r+'</option>').join("");

function visible(){
  const q = fQ.trim().toLowerCase();
  return DATA.filter(d=>
    (fBrand==="ALL"||d.b===fBrand) &&
    (!fRegion||d.r===fRegion) &&
    (!q || d.n.toLowerCase().includes(q) || d.c.toLowerCase().includes(q))
  );
}
function key(d){return d.b+"-"+d.c+"-"+d.lat;}

function popupHtml(d){
  let s='<b>'+d.n+'</b><br><span style="color:'+BRANDS[d.b].color+';font-weight:700">'+BRANDS[d.b].name+'</span> \u00b7 '+d.r+'<br>C\u00f3digo: '+d.c;
  if(origin) s+='<br><b style="color:#2563eb">'+fmtDist(haversine(origin,d))+'</b> desde '+escapeHtml(origin.label);
  return s;
}
function render(){
  let rows = visible();
  cluster.clearLayers();
  for(const k in markerByKey) delete markerByKey[k];
  const ms = rows.map(d=>{
    const m = L.marker([d.lat,d.lon],{icon:icon(d.b)});
    m.bindPopup(popupHtml(d));
    markerByKey[key(d)]=m;
    return m;
  });
  cluster.addLayers(ms);

  let dist=null; lastNearest=null;
  originLayer.clearLayers();
  if(origin){
    dist=new Map();
    rows=rows.slice();
    rows.forEach(d=>dist.set(d,haversine(origin,d)));
    rows.sort((a,b)=>dist.get(a)-dist.get(b));
    lastNearest=rows[0]||null;
    L.marker([origin.lat,origin.lon],{icon:originIcon(),zIndexOffset:1000}).addTo(originLayer)
      .bindPopup('<b>'+escapeHtml(origin.label)+'</b>');
    if(lastNearest) L.polyline([[origin.lat,origin.lon],[lastNearest.lat,lastNearest.lon]],
      {color:"#2563eb",weight:3,dashArray:"6,7",opacity:.85}).addTo(originLayer);
  }

  const list = document.getElementById("list"), cnt = document.getElementById("count");
  if(origin) cnt.innerHTML = (rows.length?"M\u00e1s cercanas a ":"Sin resultados cerca de ")+'<b>'+escapeHtml(origin.label)+'</b>';
  else cnt.textContent = rows.length.toLocaleString("es") + " sucursales";
  if(!rows.length){ list.innerHTML='<div class="empty">No hay sucursales con estos filtros.</div>'; return; }
  const shown = rows.slice(0,800);
  list.innerHTML = shown.map((d,i)=>'<div class="item" data-k="'+key(d)+'">'
      +'<span class="dot '+d.b+'"></span>'
      +'<div class="itxt"><div class="nm">'+(origin&&i===0?'<span class="star">\u2605</span> ':'')+d.n+'</div>'
      +'<div class="meta"><span class="badge '+d.b+'">'+BRANDS[d.b].name+'</span> &nbsp;'+d.r+' \u00b7 #'+d.c+'</div></div>'
      +(origin?'<span class="distbadge">'+fmtDist(dist.get(d))+'</span>':'')
    +'</div>').join("") + (rows.length>800?'<div class="empty">Mostrando 800 de '+rows.length.toLocaleString("es")+'. Refina la b\u00fasqueda o usa el mapa.</div>':"");
  list.scrollTop=0;
}

document.getElementById("list").addEventListener("click",e=>{
  const el=e.target.closest(".item"); if(!el)return;
  const m=markerByKey[el.dataset.k]; if(!m)return;
  map.flyTo(m.getLatLng(),15,{duration:.6});
  cluster.zoomToShowLayer(m,()=>m.openPopup());
});
document.getElementById("brand").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b)return;
  fBrand=b.dataset.b;
  [...e.currentTarget.children].forEach(x=>x.classList.toggle("active",x===b));
  render();
});
rsel.addEventListener("change",e=>{fRegion=e.target.value;render();});
let t; document.getElementById("q").addEventListener("input",e=>{clearTimeout(t);t=setTimeout(()=>{fQ=e.target.value;render();},180);});

function showNearInfo(){
  const el=document.getElementById("nearinfo");
  if(!origin){ el.style.display="none"; el.innerHTML=""; return; }
  el.style.display="flex";
  el.innerHTML='<span class="nearlabel" title="'+escapeHtml(origin.label)+'">Cerca de: '+escapeHtml(origin.label)+'</span><button id="clearnear" title="Quitar">✕</button>';
}
function clearOrigin(){ origin=null; lastNearest=null; showNearInfo(); render(); }
function setOrigin(lat,lon,label){
  origin={lat:+lat,lon:+lon,label:label};
  showNearInfo();
  render();
  const pts=[[origin.lat,origin.lon]];
  if(lastNearest) pts.push([lastNearest.lat,lastNearest.lon]);
  if(pts.length>1) map.fitBounds(pts,{padding:[70,70],maxZoom:15});
  else map.setView([origin.lat,origin.lon],13);
}
async function geocode(q){
  const url="https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&countrycodes=pe&accept-language=es&q="+encodeURIComponent(q);
  const res=await fetch(url);
  if(!res.ok) throw new Error("geocode "+res.status);
  const j=await res.json();
  if(!j.length) return null;
  return {lat:+j[0].lat, lon:+j[0].lon, label:j[0].display_name};
}
async function doSearch(){
  const q=document.getElementById("near").value.trim();
  if(!q) return;
  const btn=document.getElementById("nearbtn"), old=btn.textContent;
  btn.textContent="…"; btn.disabled=true;
  try{
    const r=await geocode(q);
    if(!r){ alert("No se encontró ese lugar en Perú. Prueba con otra dirección o ciudad."); return; }
    setOrigin(r.lat,r.lon,r.label);
  }catch(e){
    alert("No se pudo buscar la ubicación (puede requerir conexión a internet). También puedes hacer clic en cualquier punto del mapa.");
  }finally{ btn.textContent=old; btn.disabled=false; }
}
document.getElementById("nearbtn").addEventListener("click",doSearch);
document.getElementById("near").addEventListener("keydown",e=>{ if(e.key==="Enter") doSearch(); });
document.getElementById("geobtn").addEventListener("click",()=>{
  if(!navigator.geolocation){ alert("Tu navegador no permite geolocalización."); return; }
  const b=document.getElementById("geobtn"); b.textContent="…";
  navigator.geolocation.getCurrentPosition(
    p=>{ b.textContent="📍"; setOrigin(p.coords.latitude,p.coords.longitude,"Mi ubicación"); },
    ()=>{ b.textContent="📍"; alert("No se pudo obtener tu ubicación. Si abriste el archivo directamente, el navegador puede bloquearla: usa la búsqueda por dirección o haz clic en el mapa."); },
    {enableHighAccuracy:true,timeout:10000,maximumAge:60000});
});
document.getElementById("nearinfo").addEventListener("click",e=>{ if(e.target.closest("#clearnear")) clearOrigin(); });
map.on("click",e=>setOrigin(e.latlng.lat,e.latlng.lng,"Punto en el mapa"));

const covlegend=document.getElementById("covlegend");
function rgba(hex,a){const n=parseInt(hex.slice(1),16);return "rgba("+(n>>16&255)+","+(n>>8&255)+","+(n&255)+","+a+")";}
const COVCFG={};
["10","50","100","200"].forEach(k=>{ COVCFG[k]={geo:GAPS[k],color:"#dd1111",
  title:"Zonas a más de "+k+" km de una farmacia",
  desc:"Territorio peruano que no tiene ninguna MiFarma ni InkaFarma a menos de "+k+" km. Equivale a ≈"+GAP_PCT[k]+"% del área del país."}; });
COVCFG["p1"]={geo:DRONE.p1,color:"#00843d",
  title:"Drones Zipline · Platform 1 (alcance 60 millas / ~97 km)",
  desc:"Territorio que SÍ podría recibir entregas por dron desde una farmacia MiFarma o InkaFarma. Cubre ≈"+DRONE_PCT.p1+"% del área del país."};
COVCFG["p2"]={geo:DRONE.p2,color:"#00843d",
  title:"Drones Zipline · Platform 2 (alcance 10 millas / ~16 km)",
  desc:"Territorio que SÍ podría recibir entregas por dron desde una farmacia MiFarma o InkaFarma. Cubre ≈"+DRONE_PCT.p2+"% del área del país."};

let gapLayer=null;
function setGap(v){
  if(gapLayer){ map.removeLayer(gapLayer); gapLayer=null; }
  const cfg=COVCFG[v];
  if(cfg){
    gapLayer=L.geoJSON(cfg.geo,{interactive:false,style:{color:cfg.color,weight:1,opacity:.45,fillColor:cfg.color,fillOpacity:.32}}).addTo(map);
    gapLayer.bringToBack();
    covlegend.innerHTML='<span class="sw" style="background:'+rgba(cfg.color,.38)+';border-color:'+rgba(cfg.color,.7)+'"></span><b>'+cfg.title+'</b>'
      +'<span class="muted">'+cfg.desc+'</span>';
    covlegend.style.display="block";
  } else {
    covlegend.style.display="none";
  }
}
document.getElementById("covsel").addEventListener("change",e=>setGap(e.target.value));
setGap(document.getElementById("covsel").value);

document.getElementById("hsub").textContent =
  DATA.length.toLocaleString("es")+" locales \u00b7 "+regions.length+" regiones \u00b7 "+
  DATA.filter(d=>d.b==="MF").length.toLocaleString("es")+" MiFarma + "+
  DATA.filter(d=>d.b==="IF").length.toLocaleString("es")+" InkaFarma";
render();
</script>
